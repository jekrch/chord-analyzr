name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Bun 🥟
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies 📦
        run: bun install --frozen-lockfile

      - name: Type-check 🔎
        run: bun run typecheck

      - name: Lint 🧹
        run: bun run lint

      - name: Test 🧪
        run: bun run test:run

      - name: Build 🛠️
        run: bun run build
