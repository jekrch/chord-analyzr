services:
  flyway:
    image: flyway/flyway:11
    command: -configFiles=/flyway/conf/flyway.config -locations=filesystem:/flyway/sql -connectRetries=60 migrate
    volumes:
      - ./flyway/sql:/flyway/sql
      - ./flyway/flyway.conf:/flyway/conf/flyway.config
    depends_on:
      - postgres

  postgres:
    image: postgres:18.4
    restart: always
    ports:
    - "5432:5432"
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=pass
    - POSTGRES_DB=chordanalyzr

  data-generator:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=chordanalyzr
      - DB_USER=postgres
      - DB_PASSWORD=pass
      - OUTPUT_DIR=/output
    volumes:
      - ./frontend/public/data:/output
    depends_on:
      - flyway
    restart: "no"  # Run once and exit

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - flyway
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=chordanalyzr
      - DB_USER=postgres
      - DB_PASSWORD=pass
      - CORS_ALLOWED_ORIGINS=http://localhost:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - data-generator  # Ensure data is generated before frontend starts
    environment:
      - VITE_USE_STATIC_DATA=true  # Flag to use static data by default
      - VITE_API_BASE_URL=http://localhost:8080